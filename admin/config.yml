backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

publish_mode: simple

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "_posts"
    create: true
    delete: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string", hint: "This becomes the post headline" }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "DD-MM-YYYY", time_format: false, picker_utc: true }
      - label: "Category"
        name: "cat"
        widget: "select"
        hint: "Choose the closest match — this controls which filter tab shows the post"
        options:
          - { label: "🐕 Dogs", value: "dog" }
          - { label: "🐈 Cats", value: "cat" }
          - { label: "🐰 Exotic Animals", value: "exotic" }
          - { label: "🔬 Surgery & Lab", value: "surgery" }
          - { label: "💉 Vaccination & Health", value: "health" }
      - { label: "Summary (1-2 lines shown on blog homepage)", name: "summary", widget: "text" }
      - { label: "Read Time (minutes)", name: "read", widget: "number", default: 3, value_type: "int" }
      - { label: "Cover Image URL", name: "img", widget: "string", hint: "Paste an image link (e.g. from Google Drive, Imgur, or upload via the media button below)", required: false }
      - label: "Full Article"
        name: "body"
        widget: "markdown"
        hint: "Write the full article here. Use headings (##) for sections."
